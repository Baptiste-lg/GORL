name: GORL CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.23'

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  autoformat:
    name: Auto-format Code
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gofmt
        run: gofmt -w .

      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "[FIX] auto-format with gofmt" && git push)

  quality:
    name: Code Quality
    needs: autoformat
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}

      - name: Run go vet
        run: GOOS=js GOARCH=wasm go vet ./...

      - name: Verify WASM compilation
        run: GOOS=js GOARCH=wasm go build -o /dev/null .

  test:
    name: Run Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}

      - name: Run tests
        run: go test -v -race ./...

  deploy:
    name: Build & Deploy to GitHub Pages
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}

      - name: Build WASM Release
        run: GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o web/main.wasm .

      - name: Copy wasm_exec.js
        run: |
          # Go >=1.24 moved to lib/wasm, older versions use misc/wasm
          if [ -f "$(go env GOROOT)/misc/wasm/wasm_exec.js" ]; then
            cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" web/
          elif [ -f "$(go env GOROOT)/lib/wasm/wasm_exec.js" ]; then
            cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" web/
          else
            echo "::error::wasm_exec.js not found in GOROOT"
            find "$(go env GOROOT)" -name "wasm_exec.js" || true
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
